<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Giám Sát Xe Điều Khiển</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .icon-box { font-size: 2.5rem; color: #0d6efd; }

        // Hiệu ứng cho cảnh báo
        @keyframes blink-red {
            0% { background-color: #ffcccc; transform: scale(1); }
            50% { background-color: #dc3545; color: white; transform: scale(1.02); }
            100% { background-color: #ffcccc; transform: scale(1); }
        }
        .sos-active {
            animation: blink-red 1s infinite;
            border: 2px solid #dc3545 !important;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-car-side me-2"></i> Dashboard Xe Điều Khiển</h2>
        <span id="connectionStatus" class="badge bg-secondary fs-6 px-3 py-2">
            <i class="fa-solid fa-wifi-slash me-1"></i> Chưa kết nối
        </span>
    </div>

    <div id="sosAlert" class="alert alert-danger text-center fw-bold fs-4 d-none mb-4" role="alert">
        <i class="fa-solid fa-triangle-exclamation fa-fade me-2"></i>
        CẢNH BÁO KHẨN CẤP: PHÁT HIỆN VA CHẠM / LẬT XE!
        <br>
        <button onclick="clearSOS()" class="btn btn-outline-dark mt-3 rounded-pill fw-bold">
            <i class="fa-solid fa-check me-1"></i> Đã xử lý (Tắt báo động)
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100 p-3">
                <div class="card-body d-flex align-items-center">
                    <div class="icon-box me-3"><i class="fa-solid fa-ruler-horizontal"></i></div>
                    <div>
                        <h6 class="text-muted mb-1">Vật cản phía trước</h6>
                        <h3 class="mb-0 fw-bold" id="valDistance">0 cm</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 p-3">
                <div class="card-body d-flex align-items-center">
                    <div class="icon-box me-3 text-success"><i class="fa-solid fa-gauge-high"></i></div>
                    <div>
                        <h6 class="text-muted mb-1">Tốc độ động cơ</h6>
                        <h3 class="mb-0 fw-bold" id="valSpeed">0 %</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 p-3">
                <div class="card-body d-flex align-items-center">
                    <div class="icon-box me-3 text-warning"><i class="fa-solid fa-compass"></i></div>
                    <div>
                        <h6 class="text-muted mb-1">Trạng thái di chuyển</h6>
                        <h3 class="mb-0 fw-bold" id="valDirection">Dừng</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

    let isSosTriggered = false;

    // Hàm cập nhật trạng thái kết nối trên UI
    function setConnectionStatus(isConnected) {
        const statusBadge = document.getElementById("connectionStatus");
        if (isConnected) {
            statusBadge.className = "badge bg-success fs-6 px-3 py-2";
            statusBadge.innerHTML = '<i class="fa-solid fa-wifi me-1"></i> Đang kết nối';
        } else {
            // Khi mất mạng sẽ đưa các thông số về mặc định
            statusBadge.className = "badge bg-secondary fs-6 px-3 py-2";
            statusBadge.innerHTML = '<i class="fa-solid fa-wifi-slash me-1"></i> Chưa kết nối';
            document.getElementById("valDistance").innerText = "0 cm";
            document.getElementById("valDistance").style.color = "black";
            document.getElementById("valSpeed").innerText = "0 %";
            document.getElementById("valDirection").innerText = "Dừng";
        }
    }

    // Hàm đẩy dữ liệu lấy được từ Server lên UI
    function updateDashboard(data) {
        document.getElementById("valDistance").innerText = data.distance + " cm";
        document.getElementById("valSpeed").innerText = data.speed + " %";
        document.getElementById("valDirection").innerText = data.direction;

        const distElement = document.getElementById("valDistance");
        if(data.distance <= 15 && data.distance > 0) distElement.style.color = "red";
        else distElement.style.color = "black";

        // Kích hoạt SOS nếu có cờ từ xe gửi lên
        if (data.issos && !isSosTriggered) { // Chú ý: Backend trả về 'issos' (thường viết thường)
            isSosTriggered = true;
            document.getElementById("sosAlert").classList.remove("d-none");
            document.getElementById("sosAlert").classList.add("sos-active");
        }
    }

    // Hàm xử lý khi bấm nút "Đã xử lý"
    function clearSOS() {
        isSosTriggered = false;
        document.getElementById("sosAlert").classList.add("d-none");
        document.getElementById("sosAlert").classList.remove("sos-active");
    }

    setInterval(() => {
        fetch('https://gesture-controlled-car-api.onrender.com/api/car/status')
            .then(response => {
                if (!response.ok) throw new Error("Mất mạng");
                return response.json();
            })
            .then(data => {
                setConnectionStatus(true); // Có mạng -> Đổi màu xanh
                updateDashboard(data);     // Đổ dữ liệu thật lên giao diện
            })
            .catch(error => {
                setConnectionStatus(false); // Lỗi kết nối -> Quay về màu xám và số 0
            });
    }, 1000);
</script>

</body>
</html>
